workflows:
  validate-all:
    name: Validate backend, mobile, admin, and marketing
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 20
    scripts:
      - name: Backend install and verify
        script: |
          npm run install:backend
          cd backend
          npm run typecheck
          npm run test:build
          npm audit --audit-level=high
      - name: Mobile install and verify
        script: |
          npm run install:mobile
          cd mobile
          npx expo install --check
          npm run typecheck
          npm run lint
          npm audit --audit-level=high
      - name: Admin web install and build
        script: |
          npm run install:admin
          cd web/admin
          npm run build
          npm audit --audit-level=high
      - name: Marketing web install and build
        script: |
          npm run install:marketing
          cd web/marketing
          npm run build
          npm audit --audit-level=high

  mobile-android-debug:
    name: Mobile Android debug APK
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: 20
      java: 17
      groups:
        - public_env
    scripts:
      - name: Install mobile dependencies
        script: |
          npm run install:mobile
      - name: Generate native Android project
        script: |
          cd mobile
          npx expo prebuild --platform android --non-interactive --clean
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/mobile/android/local.properties"
      - name: Build debug APK
        script: |
          cd mobile/android
          ./gradlew assembleDebug
    artifacts:
      - mobile/android/app/build/outputs/**/*.apk
      - mobile/android/app/build/outputs/**/mapping.txt

  mobile-ios-simulator:
    name: Mobile iOS simulator app
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: 20
      xcode: 16.2
      cocoapods: default
      vars:
        XCODE_SCHEME: FileTrail
      groups:
        - public_env
    scripts:
      - name: Install mobile dependencies
        script: |
          npm run install:mobile
      - name: Generate native iOS project
        script: |
          cd mobile
          npx expo prebuild --platform ios --non-interactive --clean
      - name: Install CocoaPods dependencies
        script: |
          cd mobile/ios
          pod install
      - name: Build simulator app without code signing
        script: |
          xcodebuild \
            -workspace "$CM_BUILD_DIR/mobile/ios/$XCODE_SCHEME.xcworkspace" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - /tmp/xcodebuild_logs/*.log

  ios-testflight:
    name: iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: 20
      xcode: 26.0
      cocoapods: default
      vars:
        BUNDLE_ID: com.papertraill.app
        XCODE_SCHEME: FileTrail
        EXPO_PUBLIC_API_URL: https://papertrail-production-de23.up.railway.app
      groups:
        - ios_credentials
        - public_env
    scripts:
      - name: Install dependencies
        script: |
          npm run install:mobile
      - name: Write .env for Metro bundler
        script: |
          echo "EXPO_PUBLIC_API_URL=$EXPO_PUBLIC_API_URL" > mobile/.env
          echo "EXPO_PUBLIC_API_KEY=$EXPO_PUBLIC_API_KEY" >> mobile/.env
          echo "--- mobile/.env contents (keys only) ---"
          grep -o '^[^=]*=.' mobile/.env || true
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certs to keychain
        script: keychain add-certificates
      - name: Prebuild iOS and install CocoaPods
        script: |
          # Re-apply tar patch in case node_modules was modified after npm ci
          node scripts/patch-expo-cli-tar.cjs
          cd mobile
          CI=1 npx expo prebuild --platform ios --clean
          cd ios
          pod install
      - name: Set up code signing settings
        script: |
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/mobile/ios/$XCODE_SCHEME.xcodeproj"
      - name: Set version and build number
        script: |
          cd mobile/ios
          agvtool new-marketing-version 1.4.0
          agvtool new-version -all $((BUILD_NUMBER - 70))
      - name: Build and sign IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/mobile/ios/$XCODE_SCHEME.xcworkspace" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - mrnickrushing@gmail.com
        notify:
          success: true
          failure: true

  android-internal:
    name: Android → Internal Track
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: 20
      java: 17
      vars:
        PACKAGE_NAME: com.papertraill.app
      groups:
        - google_play_credentials
        - android_signing
        - public_env
    scripts:
      - name: Install dependencies
        script: |
          npm run install:mobile
      - name: Set up Android signing
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/keystore.jks
      - name: Prebuild Android
        script: |
          cd mobile
          npx expo prebuild --clean --platform android
      - name: Build release AAB
        script: |
          cd mobile/android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/keystore.jks \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
    artifacts:
      - mobile/android/app/build/outputs/**/*.aab
      - mobile/android/app/build/outputs/**/*.apk
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
      email:
        recipients:
          - mrnickrushing@gmail.com
        notify:
          success: true
          failure: true
